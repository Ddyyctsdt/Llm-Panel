name: LLM Queue Worker

on:
  workflow_dispatch:          # اجرای دستی از دکمه Actions در GitHub
  schedule:
    - cron: '55 5,11,17,23 * * *'   # هر روز ساعت 5:55، 11:55، 17:55، 23:55 (UTC)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # 6 ساعت حداکثر زمان اجرا (متناسب با cron)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies (optimized llama-cpp-python)
        run: |
          pip install requests
          CMAKE_ARGS="-DLLAMA_AVX2=on -DLLAMA_FMA=on -DLLAMA_BLIS=on" pip install llama-cpp-python

      - name: Cache model file
        uses: actions/cache@v4
        with:
          path: ./model.gguf
          key: qwen-2b-ud-q4-xl-v1
          restore-keys: |
            qwen-2b-ud-q4-xl-v1

      - name: Run bot (polling KV)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
        run: python bot.py
